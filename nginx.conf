server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;

    # --- SPA fallback — all routes serve index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Cache immutable hashed assets (JS/CSS fingerprinted by Vite) ---
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security headers repeated so they appear on every response block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self'; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data:; "
            "connect-src 'self'; "
            "frame-ancestors 'none'; "
            "base-uri 'self'; "
            "form-action 'self';"
            always;
    }

    # --- SVG: needs its own block — no script execution allowed ---
    location ~* \.svg$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Type "image/svg+xml";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline';" always;
        add_header X-Frame-Options "DENY" always;
    }

    # --- index.html: no-cache, full security headers ---
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires 0;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content-Security-Policy
        # 'unsafe-inline' on style-src is required for Vite's inline style injection.
        # No 'unsafe-eval' — the app runs zero eval/Function calls in production.
        # Google Fonts external style + font loads are explicitly allowed.
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self'; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data:; "
            "connect-src 'self'; "
            "frame-ancestors 'none'; "
            "base-uri 'self'; "
            "form-action 'self';"
            always;
    }

    # --- Hide nginx version ---
    server_tokens off;

    # --- Prevent access to dotfiles (.env, .git, etc.) ---
    location ~ /\. {
        deny all;
        return 404;
    }
}
